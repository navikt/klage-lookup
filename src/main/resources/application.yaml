spring:
  application:
    name: klage-lookup
  data:
    redis:
      host: ${VALKEY_HOST_LOOKUP}
      port: ${VALKEY_PORT_LOOKUP}
      password: ${VALKEY_PASSWORD_LOOKUP}
      username: ${VALKEY_USERNAME_LOOKUP}
      ssl:
        enabled: true

management:
  endpoint:
    health:
      show-details: always
  endpoints.web:
    exposure:
      include: info, health, metrics, prometheus
    base-path: "/internal"
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

server:
  port: 8080

